    "langchain",
    "langchain-core",
    "langchain-openai",
    "langsmith",
    "openai",
    "tiktoken",
    "distro",
    
    # ===== HTTP — aiohttp for mesh communication =====
    "aiohttp",
    "multidict",
    "frozenlist",
    "aiosignal",
    
    # ===== UTILITY — Regex, JSON, etc. =====
    "regex",
    "jsonpatch",
