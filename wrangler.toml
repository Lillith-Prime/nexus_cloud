    "celery",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-instrumentation-httpx",
    "prometheus-client",
    "pytest",
    "pytest-asyncio",
    "isort",
    "mypy"
][env.worker-012]
