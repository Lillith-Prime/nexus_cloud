# ============================================================================
# TRIGGERS & SCHEDULES
# ============================================================================

[triggers]
crons = ["*/10 * * * *"]

# ============================================================================
# OBSERVABILITY
# ============================================================================

[observability]
logs = { enabled = true, retention_days = 7 }
traces = { enabled = true, sampling_rate = 0.1 }
metrics = { enabled = true }

# ============================================================================
# BUILD & DEPENDENCIES (referencing pyproject.toml)
# ============================================================================

[build]
command = "pip install -r requirements.txt"
watch_dir = "src"

# ============================================================================
# PYTHON CONFIGURATION
# ============================================================================

[python]
packages = [
    "fastapi",
    "uvicorn",
    "numpy",
    "psutil",
    "redis",
    "nats-py",
    "httpx",
    "cryptography",
    "pyjwt",
    "black",
    "autopep8",
    "python-multipart",
    "pydantic",
    "websockets",
    "aiohttp",
    "sqlalchemy",
    "asyncpg",
    "alembic",
    "torch",
    "transformers",
    "sentence-transformers",
    "langchain",
    "langgraph",
    "langchain-community",
    "langchain-openai",
    "langchain-anthropic",
    "langchain-google-genai",
    "openai",
    "anthropic",
    "google-generativeai",
    "qdrant-client",
    "weaviate-client",
    "pinecone-client",
    "chromadb",
    "qiskit",
    "pennylane",
    "cirq",
    "qutip",
    "ray",
    "dask",
    "celery",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-instrumentation-httpx",
    "prometheus-client",
    "pytest",
    "pytest-asyncio",
    "isort",
    "mypy"
]
}
    
