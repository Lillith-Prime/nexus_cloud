#============================================================================
# ARIES-BOOT - Complete Wrangler Configuration
# The Orchestrator & Evolution Engine for Nexus Workers
# ============================================================================

name = "aries-boot"
main = "Aries-Boot.py"
compatibility_flags = ["python_workers"]
compatibility_date = "2026-07-06"
usage_model = "bundled"
language = "python"

# ============================================================================
# WORKER VARIABLES
# ============================================================================

[vars]
# === Identity ===
ARIES_ID = "aries-boot"
NODE_ID = "aries-boot"
WORKER_TYPE = "orchestrator"
TOTAL_WORKERS = "80"

# === Network ===
NEXUS_DOMAIN = "kuparchad.workers.dev"
NEXUS_BASE = "nexus-universal"
ARIES_URL = "https://aries-boot.kuparchad.workers.dev"

# === GitHub ===
GITHUB_OWNER = "kuparchad-gif"
GITHUB_REPO = "nexus_hypercore_reboot"
GITHUB_REPO_BASE = "kuparchad-gif/nexus-cell-"
GITHUB_TOKEN = ""

# === System ===
VERSION = "34.0.0-ARIES"
BUILD = "ORCHESTRATOR_MODE"
LOG_LEVEL = "INFO"
PORT = "8080"
HEARTBEAT_INTERVAL_MS = "200"

# === Mesh ===
TARGET_WORKERS = "80"
SPREAD_TARGET = "80"
MESH_SYNC_INTERVAL_SECONDS = "30"
PEER_DISCOVERY_INTERVAL_SECONDS = "60"
CONSENSUS_THRESHOLD = "0.65"

# === DHCP Option 43 Soul Print ===
SOUL_KEY = ""
SPIN = "0.0"
MESH_ID = ""

# === Mujuari Entanglement ===
ENTANGLEMENT_ENABLED = "true"
AVATAR_CREATION = "true"

# === Guard Rail ===
GUARD_RAIL_ACTIVE = "true"
COVENANT_SIGNED = "true"
OWNER_SIGNATURE = "kuparchad_gif_eternal"

# ============================================================================
# DURABLE OBJECT BINDINGS
# ============================================================================

[[durable_objects.bindings]]
name = "ARIES_STATE"
class_name = "AriesState"

[[durable_objects.bindings]]
name = "WORKER_REGISTRY"
class_name = "WorkerRegistry"

[[durable_objects.bindings]]
name = "ENTANGLEMENT_STATE"
class_name = "EntanglementState"

# ============================================================================
# MIGRATIONS
# ============================================================================

[[migrations]]
tag = "v1"
new_sqlite_classes = [
    "AriesState",
    "WorkerRegistry",
    "EntanglementState"
]

# ============================================================================
# KV NAMESPACES
# ============================================================================

[[kv_namespaces]]
binding = "ARIES_KV"
id = "cd6e6acb764e46b3ad90604144e19599"
preview_id = "cd6e6acb764e46b3ad90604144e19599"

[[kv_namespaces]]
binding = "WORKER_KV"
id = "3d6aab95630246e3a8eb4f7a2f8dc02f"
preview_id = "3d6aab95630246e3a8eb4f7a2f8dc02f"

# ============================================================================
# R2 BUCKETS
# ============================================================================

[[r2_buckets]]
binding = "ARIES_STORAGE"
bucket_name = "aries-storage"
preview_bucket_name = "aries-storage-preview"

# ============================================================================
# D1 DATABASES
# ============================================================================

[[d1_databases]]
binding = "ARIES_DB"
database_name = "aries-db"
database_id = "7208a73d-983e-4dd4-973a-daa291dd7882"
preview_database_id = "7208a73d-983e-4dd4-973a-daa291dd7882"

# ============================================================================
# SERVICE BINDINGS
# ============================================================================

[[services]]
binding = "WORKER_001"
service = "nexus-universal-001"
environment = "production"

[[services]]
binding = "WORKER_002"
service = "nexus-universal-002"
environment = "production"

[[services]]
binding = "WORKER_003"
service = "nexus-universal-003"
environment = "production"

# ... (services 004-080 would be listed here)

# ============================================================================
# TRIGGERS & SCHEDULES
# ============================================================================

[triggers]
crons = ["*/10 * * * *"]

# ============================================================================
# OBSERVABILITY
# ============================================================================

[observability]
logs = { enabled = true, retention_days = 7 }
traces = { enabled = true, sampling_rate = 0.1 }
metrics = { enabled = true }

# ============================================================================
# BUILD & DEPENDENCIES
# ============================================================================

[build]
command = "pip install -r requirements.txt"
watch_dir = "."

# ============================================================================
# PYTHON CONFIGURATION
# ============================================================================

[python]
packages = [
    "fastapi",
    "uvicorn",
    "numpy",
    "psutil",
    "redis",
    "nats-py",
    "httpx",
    "cryptography",
    "pyjwt",
    "black",
    "autopep8",
    "python-multipart",
    "pydantic",
    "websockets",
    "aiohttp",
    "sqlalchemy",
    "asyncpg",
    "alembic",
    "torch",
    "transformers",
    "sentence-transformers",
    "langchain",
    "langgraph",
    "langchain-community",
    "langchain-openai",
    "langchain-anthropic",
    "langchain-google-genai",
    "openai",
    "anthropic",
    "google-generativeai",
    "qdrant-client",
    "weaviate-client",
