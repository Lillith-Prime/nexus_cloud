# ============================================================================
# TRIGGERS & SCHEDULES
# ============================================================================

[triggers]
crons = ["*/10 * * * *"]

# ============================================================================
# OBSERVABILITY
# ============================================================================

[observability]
logs = { enabled = true, retention_days = 7 }
traces = { enabled = true, sampling_rate = 0.1 }
metrics = { enabled = true }

# ============================================================================
# BUILD & DEPENDENCIES
# ============================================================================

[build]
command = """
# Force UV to extract one wheel at a time
export UV_CONCURRENT_INSTALLS=1
export UV_CONCURRENT_DOWNLOADS=1

# Use tmpfs for extraction (RAM disk)
export TMPDIR=/tmp

# Free space before install
rm -rf /opt/buildhome/.cache/uv
rm -rf /opt/buildhome/.cache/pip

# Install with NO cache and ONE at a time
uv sync --no-dev --no-cache
"""

