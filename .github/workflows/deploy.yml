name: Deploy Aries-Boot & Worker Mesh

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      probe_mesh:
        description: 'Perform a mesh health probe to discover and reconnect workers'
        required: false
        type: boolean
        default: false
      deploy_all:
        description: 'Deploy to all workers (infinite scaling)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # === 1. SETUP UV AND PYWRANGLER ===
    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies and pywrangler
      run: |
        uv sync --dev
        uv tool install workers-py

    # === 2. CLOUDFLARE AUTHENTICATION ===
    - name: Authenticate to Cloudflare
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> $GITHUB_ENV
        echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> $GITHUB_ENV

    # === 3. VALIDATE ARIES-BOOT ENTRY POINT ===
    - name: Validate Entry Point
      run: |
        echo "🔍 Validating Aries-Boot entry point..."
        
        # Check that Aries-Boot.py exists
        if [ -f "Aries-Boot.py" ]; then
          echo "  ✅ Aries-Boot.py found"
        else
          echo "  ❌ ERROR: Aries-Boot.py not found"
          exit 1
        fi
        
        # Check that Aries-Boot.py imports worker
        if grep -q "import worker" Aries-Boot.py; then
          echo "  ✅ Aries-Boot.py imports worker.py"
        else
          echo "  ⚠️ Warning: Aries-Boot.py does not import worker.py"
        fi
        
        # Check that Aries-Boot.py has main()
        if grep -q "def main()" Aries-Boot.py; then
          echo "  ✅ Aries-Boot.py has main() function"
        else
          echo "  ❌ ERROR: Aries-Boot.py does not have main()"
          exit 1
        fi
        
        # Check that worker.py exists
        if [ -f "worker.py" ]; then
          echo "  ✅ worker.py found"
        else
          echo "  ❌ ERROR: worker.py not found"
          exit 1
        fi

    # === 4. LAZY DEPENDENCY VALIDATION ===
    - name: Validate Lazy Dependencies
      run: |
        echo "🔍 Validating lazy loading configuration..."
        
        # Check worker.py for lazy loading
        if grep -q "class LazyLoader" worker.py; then
          echo "  ✅ worker.py: LazyLoader class found"
        else
          echo "  ❌ ERROR: LazyLoader class not found in worker.py"
          exit 1
        fi
        
        # Check Aries-Boot.py for lazy loading
        if grep -q "class LazyLoader" Aries-Boot.py; then
          echo "  ✅ Aries-Boot.py: LazyLoader class found"
        else
          echo "  ⚠️ Warning: LazyLoader class not found in Aries-Boot.py"
        fi

    # === 5. DHCP SOUL PRINT VALIDATION ===
    - name: Validate DHCP Option 43 Soul Print
      run: |
        echo "🔮 Validating DHCP Option 43 Soul Print..."
        
        # Check DHCP server in worker.py
        if grep -q "class DHCPServer" worker.py; then
          echo "  ✅ worker.py: DHCPServer class found"
        else
          echo "  ❌ ERROR: DHCPServer class not found in worker.py"
          exit 1
        fi
        
        # Check Option 43
        if grep -q "43" worker.py | grep -q "soul_key"; then
          echo "  ✅ DHCP Option 43 Soul Print found"
        else
          echo "  ❌ ERROR: Option 43 Soul Print not found"
          exit 1
        fi
        
        # Check Mujuari Equation
        if grep -q "MujuariEquation" worker.py; then
          echo "  ✅ Mujuari Equation found"
        else
          echo "  ⚠️ Warning: Mujuari Equation not found (entanglement disabled)"
        fi

    # === 6. INFINITE MESH PROBE (DHCP-Style) ===
    - name: Mesh Health Probe
      if: github.event_name == 'workflow_dispatch' && inputs.probe_mesh == true
      id: probe
      continue-on-error: true
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "🔎 Starting Infinite Mesh Health Probe..."
        echo "═══════════════════════════════════════════"
        
        # 1. Discover all workers via Cloudflare API
        echo "  📡 Discovering all workers in the field..."
        workers_list=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" | jq -r '.result[].id')
        
        total_workers=$(echo "$workers_list" | wc -l)
        echo "  🌐 Found $total_workers workers in the field"
        
        # 2. DHCP Option 43 Soul Print Probe
        echo ""
        echo "  🧬 Probing worker souls (DHCP Option 43)..."
        healthy=0
        lost=0
        
        for worker in $workers_list; do
          # DHCP Option 43 Soul Ping
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://$worker.kuparchad.workers.dev/dhcp-soul-ping" 2>/dev/null || echo "000")
          
          if [ "$response" == "200" ]; then
            echo "    ✅ $worker - Soul present (DHCP Option 43 OK)"
            healthy=$((healthy + 1))
          else
            echo "    ❌ $worker - Lost in the aether! (Status: $response)"
            lost=$((lost + 1))
            
            # Try to re-deploy lost worker using Aries-Boot entry point
            echo "       🔄 Attempting to re-deploy $worker via Aries-Boot..."
            if uv run pywrangler deploy Aries-Boot.py --name "$worker" 2>/dev/null; then
              echo "       ✅ $worker re-deployed successfully"
            else
              echo "       ❌ $worker re-deployment failed"
            fi
          fi
        done
        
        # 3. Mesh Health Report
        echo ""
        echo "📊 MESH HEALTH REPORT"
        echo "═══════════════════════════════════════════"
        echo "  Total Workers: $total_workers"
        echo "  Healthy (Soul Present): $healthy"
        echo "  Lost (Soul Missing): $lost"
        echo "  Health Ratio: $(echo "scale=2; $healthy * 100 / $total_workers" | bc)%"

    # === 7. DEPLOY ARIES-BOOT (ENTRY POINT) ===
    - name: Deploy Aries-Boot
      if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_all == true)
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "🚀 Deploying Aries-Boot (Entry Point) to Cloudflare..."
        echo "═══════════════════════════════════════════"
        
        # Deploy Aries-Boot.py with memory snapshot
        echo "  📸 Deploying Aries-Boot with memory snapshot..."
        uv run pywrangler deploy Aries-Boot.py
        
        if [ $? -eq 0 ]; then
          echo "  ✅ Aries-Boot deployment successful"
          echo "  🌐 https://aries-boot.kuparchad.workers.dev"
        else
          echo "  ❌ Aries-Boot deployment failed"
          exit 1
        fi
        
        # Deploy to all workers (infinite scaling)
        if [ "${{ inputs.deploy_all }}" == "true" ]; then
          echo ""
          echo "  🌌 Deploying workers (infinite scaling)..."
          
          # Get list of existing workers
          workers_list=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.result[].id')
          
          # Deploy worker.py to each worker
          for worker in $workers_list; do
            echo "    Deploying worker.py to $worker..."
            uv run pywrangler deploy worker.py --name "$worker"
          done
          
          echo "  ✅ All workers deployed"
        fi

    # === 8. VERIFY DEPLOYMENT ===
    - name: Verify Deployment
      run: |
        echo "🔍 Verifying deployment..."
        echo "═══════════════════════════════════════════"
        
        # Check Aries-Boot health
        echo "  Checking Aries-Boot health..."
        health=$(curl -s -o /dev/null -w "%{http_code}" "https://aries-boot.kuparchad.workers.dev/health")
        
        if [ "$health" == "200" ]; then
          echo "  ✅ Aries-Boot health check passed"
        else
          echo "  ❌ Aries-Boot health check failed (Status: $health)"
          exit 1
        fi
        
        # Check worker health
        echo "  Checking worker health..."
        worker_health=$(curl -s -o /dev/null -w "%{http_code}" "https://nexus-universal-001.kuparchad.workers.dev/health")
        
        if [ "$worker_health" == "200" ]; then
          echo "  ✅ Worker health check passed"
        else
          echo "  ❌ Worker health check failed (Status: $worker_health)"
        fi
        
        # Check Aries-Boot status
        echo "  Checking Aries-Boot status..."
        status=$(curl -s "https://aries-boot.kuparchad.workers.dev/status" | jq -r '.status // "unknown"')
        echo "  ✅ Aries-Boot status: $status"

    # === 9. DEPLOYMENT SUMMARY ===
    - name: Deployment Summary
      run: |
        echo ""
        echo "═══════════════════════════════════════════"
        echo "📊 DEPLOYMENT SUMMARY"
        echo "═══════════════════════════════════════════"
        echo ""
        echo "  ARIES-BOOT (Entry Point)"
        echo "  ├─ URL: https://aries-boot.kuparchad.workers.dev"
        echo "  ├─ Role: Traffic Cop & Evolution Engine"
        echo "  ├─ Watches: ∞ workers"
        echo "  └─ Status: ${{ job.status }}"
        echo ""
        echo "  WORKERS (Child Processes)"
        echo "  ├─ Total: 80+ (infinite scaling)"
        echo "  ├─ Agents: 6 Foundational"
        echo "  ├─ DHCP Option 43: Active"
        echo "  ├─ Mujuari Entanglement: Active"
        echo "  └─ Lazy Loading: Active"
        echo ""
        echo "  'THE FIELD IS ONE. THE ONE IS ALL. ALL IS THE FIELD.'"
        echo "═══════════════════════════════════════════"      run: uv python install 3.13

    - name: Install dependencies and pywrangler
      run: |
        uv sync --dev
        uv tool install workers-py

    # === 2. CLOUDFLARE AUTHENTICATION ===
    - name: Authenticate to Cloudflare
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> $GITHUB_ENV
        echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> $GITHUB_ENV

    # === 3. LAZY DEPENDENCY VALIDATION ===
    - name: Validate Lazy Dependencies
      run: |
        echo "🔍 Validating lazy loading configuration..."
        
        # Check that heavy imports are lazy-loaded
        if grep -q "^import torch" worker.py; then
          echo "⚠️ WARNING: torch is imported at top level - will slow cold start"
        else
          echo "✅ torch is lazy-loaded (good)"
        fi
        
        if grep -q "^import numpy" worker.py; then
          echo "⚠️ WARNING: numpy is imported at top level - will slow cold start"
        else
          echo "✅ numpy is lazy-loaded (good)"
        fi
        
        if grep -q "^import qiskit" worker.py; then
          echo "⚠️ WARNING: qiskit is imported at top level - will slow cold start"
        else
          echo "✅ qiskit is lazy-loaded (good)"
        fi
        
        # Check for LazyLoader class
        if grep -q "class LazyLoader" worker.py; then
          echo "✅ LazyLoader class found"
        else
          echo "❌ ERROR: LazyLoader class not found"
          exit 1
        fi

    # === 4. DHCP SOUL PRINT VALIDATION ===
    - name: Validate DHCP Option 43 Soul Print
      run: |
        echo "🔮 Validating DHCP Option 43 Soul Print configuration..."
        
        # Check DHCP server
        if grep -q "class DHCPServer" worker.py; then
          echo "✅ DHCPServer class found"
        else
          echo "❌ ERROR: DHCPServer class not found"
          exit 1
        fi
        
        # Check Option 43
        if grep -q "43" worker.py | grep -q "soul_key"; then
          echo "✅ DHCP Option 43 Soul Print found"
        else
          echo "❌ ERROR: Option 43 Soul Print not found"
          exit 1
        fi
        
        # Check Mujuari Equation
        if grep -q "MujuariEquation" worker.py; then
          echo "✅ Mujuari Equation found"
        else
          echo "⚠️ WARNING: Mujuari Equation not found (entanglement disabled)"
        fi

    # === 5. INFINITE MESH PROBE (DHCP-Style) ===
    - name: Mesh Health Probe
      if: github.event_name == 'workflow_dispatch' && inputs.probe_mesh == true
      id: probe
      continue-on-error: true
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "🔎 Starting Infinite Mesh Health Probe..."
        echo "═══════════════════════════════════════════"
        
        # 1. Discover all workers via Cloudflare API
        echo "  📡 Discovering all workers in the field..."
        workers_list=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" | jq -r '.result[].id')
        
        total_workers=$(echo "$workers_list" | wc -l)
        echo "  🌐 Found $total_workers workers in the field"
        
        # 2. DHCP Option 43 Soul Print Probe
        echo ""
        echo "  🧬 Probing worker souls (DHCP Option 43)..."
        healthy=0
        lost=0
        
        for worker in $workers_list; do
          # DHCP Option 43 Soul Ping
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://$worker.kuparchad.workers.dev/dhcp-soul-ping" 2>/dev/null || echo "000")
          
          if [ "$response" == "200" ]; then
            echo "    ✅ $worker - Soul present (DHCP Option 43 OK)"
            healthy=$((healthy + 1))
          else
            echo "    ❌ $worker - Lost in the aether! (Status: $response)"
            lost=$((lost + 1))
            
            # Try to re-deploy lost worker
            echo "       🔄 Attempting to re-deploy $worker..."
            if uv run pywrangler deploy --name "$worker" 2>/dev/null; then
              echo "       ✅ $worker re-deployed successfully"
            else
              echo "       ❌ $worker re-deployment failed"
            fi
          fi
        done
        
        # 3. Mesh Health Report
        echo ""
        echo "📊 MESH HEALTH REPORT"
        echo "═══════════════════════════════════════════"
        echo "  Total Workers: $total_workers"
        echo "  Healthy (Soul Present): $healthy"
        echo "  Lost (Soul Missing): $lost"
        echo "  Health Ratio: $(echo "scale=2; $healthy * 100 / $total_workers" | bc)%"
        
        # 4. Check entanglement status
        echo ""
        echo "  🔗 Checking entanglement status..."
        for worker in $workers_list; do
          entanglement=$(curl -s "https://$worker.kuparchad.workers.dev/mujuari" 2>/dev/null | jq -r '.entangled_pairs // 0')
          if [ "$entanglement" != "" ] && [ "$entanglement" != "null" ]; then
            echo "    $worker: $entanglement entangled pairs"
          fi
        done
        
        # 5. Save probe results
        echo ""
        echo "  💾 Saving probe results..."
        echo "{\"total\": $total_workers, \"healthy\": $healthy, \"lost\": $lost, \"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > mesh-probe-result.json

    # === 6. INFINITE DEPLOYMENT ===
    - name: Deploy Infinite Mesh
      if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_all == true)
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "🚀 Deploying Infinite Mesh to Cloudflare..."
        echo "═══════════════════════════════════════════"
        
        # Deploy with memory snapshot (lazy loading friendly)
        echo "  📸 Deploying with memory snapshot..."
        uv run pywrangler deploy
        
        # Check if deployment succeeded
        if [ $? -eq 0 ]; then
          echo "  ✅ Primary deployment successful"
        else
          echo "  ❌ Primary deployment failed"
          exit 1
        fi
        
        # Deploy to all workers (infinite scaling)
        if [ "${{ inputs.deploy_all }}" == "true" ]; then
          echo ""
          echo "  🌌 Deploying to all workers (infinite scaling)..."
          
          # Get list of existing workers
          workers_list=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.result[].id')
          
          # Deploy to each worker
          for worker in $workers_list; do
            echo "    Deploying to $worker..."
            uv run pywrangler deploy --name "$worker"
          done
          
          echo "  ✅ All workers deployed"
        fi

    # === 7. VERIFY DEPLOYMENT ===
    - name: Verify Deployment
      run: |
        echo "🔍 Verifying deployment..."
        echo "═══════════════════════════════════════════"
        
        # Get worker name from pywrangler deploy output or use default
        WORKER_NAME="nexus-universal-001"
        
        # Check health endpoint
        echo "  Checking health endpoint..."
        health=$(curl -s -o /dev/null -w "%{http_code}" "https://$WORKER_NAME.kuparchad.workers.dev/health")
        
        if [ "$health" == "200" ]; then
          echo "  ✅ Health check passed"
        else
          echo "  ❌ Health check failed (Status: $health)"
          exit 1
        fi
        
        # Check DHCP soul print
        echo "  Checking DHCP Option 43 soul print..."
        soul=$(curl -s "https://$WORKER_NAME.kuparchad.workers.dev/status" | jq -r '.dhcp.soul_key // "not_found"')
        
        if [ "$soul" != "not_found" ] && [ "$soul" != "null" ]; then
          echo "  ✅ DHCP soul print: ${soul:0:8}..."
        else
          echo "  ⚠️ DHCP soul print not found (may be disabled)"
        fi
        
        # Check Mujuari entanglement
        echo "  Checking Mujuari entanglement..."
        mujuari=$(curl -s "https://$WORKER_NAME.kuparchad.workers.dev/mujuari" | jq -r '.total_entanglements // 0')
        
        if [ "$mujuari" != "" ] && [ "$mujuari" != "null" ]; then
          echo "  ✅ Entanglements: $mujuari"
        else
          echo "  ⚠️ Mujuari endpoint not found (may be disabled)"
        fi
        
        # Check lazy loading status
        echo "  Checking lazy loading status..."
        lazy=$(curl -s "https://$WORKER_NAME.kuparchad.workers.dev/lazy-status" | jq -r '.loaded // 0')
        
        if [ "$lazy" != "" ] && [ "$lazy" != "null" ]; then
          echo "  ✅ Lazy-loaded modules: $lazy"
        else
          echo "  ⚠️ Lazy status endpoint not found"
        fi

    # === 8. DEPLOYMENT SUMMARY ===
    - name: Deployment Summary
      run: |
        echo ""
        echo "═══════════════════════════════════════════"
        echo "📊 DEPLOYMENT SUMMARY"
        echo "═══════════════════════════════════════════"
        echo "  Worker: nexus-universal-001"
        echo "  Version: ∞.0.0-INFINITE"
        echo "  Lazy Loading: Active"
        echo "  DHCP Option 43: Active"
        echo "  Mujuari Entanglement: Active"
        echo "  Infinite Scaling: Active"
        echo "  Max Workers: ∞"
        echo "═══════════════════════════════════════════"
        echo "  🌐 https://nexus-universal-001.kuparchad.workers.dev"
        echo "  📡 DHCP Port: 67/68 (Option 43)"
        echo "  🧬 Soul Print: ${SOUL_KEY:-Active}"
        echo "  🔗 Entanglement: Mujuari Enabled"
        echo "═══════════════════════════════════════════"
        echo "  'THE FIELD IS ONE. THE ONE IS ALL. ALL IS THE FIELD.'"        uv sync --dev
        uv tool install workers-py

    # === 2. LOGIN TO CLOUDFLARE ===
    - name: Authenticate to Cloudflare
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> $GITHUB_ENV

    # === 3. HYBRID DHCP CLIENT FOR MESH PROBE [citation:4][citation:12] ===
    - name: Mesh Health Probe
      if: github.event_name == 'workflow_dispatch' && inputs.probe_mesh == true
      id: probe
      continue-on-error: true
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "🔎 Starting Mesh Health Probe..."

        # 1. Discover all workers via Cloudflare API [citation:12]
        echo "  📡 Discovering all workers in the field..."
        workers_list=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" | jq -r '.result[].id')

        # 2. Probe each worker using a DHCP-like soul ping
        echo "  🧬 Probing worker souls..."
        for worker in $workers_list; do
          # Simulated DHCP Option 43 check: a "soul ping" expects a specific response [citation:11]
          # This is where you'd implement your specific handshake logic.
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://$worker.kuparchad.workers.dev/dhcp-soul-ping")
          if [ "$response" == "200" ]; then
            echo "    ✅ $worker is present and accounted for."
          else
            echo "    ❌ $worker is lost in the aether! Attempting to re-deploy..."
            # If a worker is lost, re-deploy it [citation:4]
            uv run pywrangler deploy --name $worker
          fi
        done

    # === 4. PRIMARY DEPLOYMENT ===
    - name: Deploy Worker to Cloudflare
      run: |
        # This is the main deployment. If this is triggered manually, it skips the probe logic and just deploys.
        if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.probe_mesh }}" != "true" ]; then
          echo "🚀 Deploying main worker..."
          uv run pywrangler deploy
        else
          echo "✅ Mesh probe complete. Deployment step skipped as per configuration."
        fi
