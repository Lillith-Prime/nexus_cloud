name: Deploy Nexus Workers to Cloudflare

on:
  push:
    branches: [ main ]
    paths:
      - 'worker.py'
      - 'requirements.txt'
      - 'wrangler.toml'
  workflow_dispatch:
    inputs:
      workers:
        description: 'Number of workers to deploy'
        required: true
        default: '80'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Cloudflare build timeout is 20 min
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install uv (fast package installer)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install pywrangler (Cloudflare's new tool)
        run: |
          uv tool install workers-py
      
      - name: Split requirements for Cloudflare compatibility
        run: |
          # Create lightweight requirements for Cloudflare
          grep -v -E "(torch|tensorflow|qiskit|transformers|opencv|numpy|scipy)" requirements.txt > requirements.cf.txt || echo "No requirements"
          echo "numpy" >> requirements.cf.txt
          echo "fastapi" >> requirements.cf.txt
          echo "uvicorn" >> requirements.cf.txt
          echo "httpx" >> requirements.cf.txt
          echo "python-multipart" >> requirements.cf.txt
      
      - name: Deploy with pywrangler (memory snapshot)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKERS_COUNT: ${{ github.event.inputs.workers || '80' }}
        run: |
          # Deploy main worker script with memory snapshot
          pywrangler deploy worker.py \
            --name nexus-universal-001 \
            --compatibility-date 2026-07-06 \
            --requirements requirements.cf.txt \
            --snapshot-memory \
            --env WORKERS_COUNT=$WORKERS_COUNT
      
      - name: Deploy all 80 workers (parallel)
        if: success()
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Deploy workers in parallel batches
          for i in $(seq 1 80); do
            name=$(printf "nexus-universal-%03d" $i)
            echo "Deploying $name..."
            pywrangler deploy worker.py \
              --name $name \
              --compatibility-date 2026-07-06 \
              --requirements requirements.cf.txt \
              --snapshot-memory &
            
            # Limit parallel deployments to avoid rate limits
            if (( i % 10 == 0 )); then
              wait
            fi
          done
          wait
      
      - name: Verify deployment
        run: |
          for i in $(seq 1 3); do
            name=$(printf "nexus-universal-%03d" $i)
            echo "Verifying $name..."
            curl -s "https://$name.kuparchad.workers.dev/health" || echo "⚠️ $name not responding"
          done
